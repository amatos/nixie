creation_rules:
  # ldapHosts — muninn's KDC/LDAP boot-time secrets (highest-consequence group)
  - path_regex: ^ldap/.*$
    key_groups:
      - age:
          - *alberth
          - *yubikey_d43f4e92
          - *yubikey_2ab5ff2f
          - *yubikey_be7a2b66
          - *yubikey_49705840
          - *yubikey_7cb1cad0
          - *yubikey_b4d67c6f
          - *muninn

  # unifiBackupHosts — unifi-backup runs on porkchop
  - path_regex: ^unifi/backup-ssh-key.*$
    key_groups:
      - age:
          - *alberth
          - *yubikey_d43f4e92
          - *yubikey_2ab5ff2f
          - *yubikey_be7a2b66
          - *yubikey_49705840
          - *yubikey_7cb1cad0
          - *yubikey_b4d67c6f
          - *porkchop

  # smtpSmartRelays — huginn (primary) + porkchop (backup)
  - path_regex: ^smtp-relay-sasl.*$
    key_groups:
      - age:
          - *alberth
          - *yubikey_d43f4e92
          - *yubikey_2ab5ff2f
          - *yubikey_be7a2b66
          - *yubikey_49705840
          - *yubikey_7cb1cad0
          - *yubikey_b4d67c6f
          - *porkchop
          - *huginn

  # remoteBuildHosts — codex is the remote-build client
  - path_regex: ^builder/codex-ssh-key.*$
    key_groups:
      - age:
          - *alberth
          - *yubikey_d43f4e92
          - *yubikey_2ab5ff2f
          - *yubikey_be7a2b66
          - *yubikey_49705840
          - *yubikey_7cb1cad0
          - *yubikey_b4d67c6f
          - *codex

  # grafanaHosts — Grafana runs on porkchop
  - path_regex: ^grafana-secret-key.*$
    key_groups:
      - age:
          - *alberth
          - *yubikey_d43f4e92
          - *yubikey_2ab5ff2f
          - *yubikey_be7a2b66
          - *yubikey_49705840
          - *yubikey_7cb1cad0
          - *yubikey_b4d67c6f
          - *porkchop

  # Fleet-wide catch-all — users ++ systems (also covers syncthingHosts,
  # which is currently identical to systems). Must stay last: sops uses
  # first-matching-rule-wins, so this is the fallback for every path not
  # matched above (github/*, luadns.ini, tailscale-authkey, cachix-authtoken,
  # default-nixos-user-password, unifi/api-key, users/*, ghostty-themes/*,
  # syncthing-gui-password).
  - path_regex: .*
    key_groups:
      - age:
          - *alberth
          - *yubikey_d43f4e92
          - *yubikey_2ab5ff2f
          - *yubikey_be7a2b66
          - *yubikey_49705840
          - *yubikey_7cb1cad0
          - *yubikey_b4d67c6f
          - *codex
          - *gammu
          - *porkchop
          - *huginn
          - *muninn
