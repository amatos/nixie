name: flake-update branch CI

# Triggers when nixieflakeup (update-flake.py) pushes to flake-update, a
# disposable branch that's always reset to main's tip plus one or more
# lockfile-only commits — see nix-home-alberth's update-flake.py. Delegates
# validation (nix fmt/statix/deadnix/flake check) and the merge into main to
# the reusable workflow in amatos/.github, shared across repos in this
# account.

on:
  push:
    branches: [flake-update]

jobs:
  validate-and-merge:
    permissions:
      contents: write
      pull-requests: write
    uses: amatos/.github/.github/workflows/flake-lock-ci.yml@main
    with:
      cachix-cache-name: ${{ vars.CACHIX_CACHE_NAME }}
      deadnix-exclude: "**/hardware-configuration.nix"
    secrets: inherit
