name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Formatting ────────────────────────────────────────────────────────────
  # No nix-secrets needed — uses registry nixpkgs to avoid fetching all inputs
  # just to run a formatter.
  lint:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - name: Check .nix formatting
        run: |
          find . -name '*.nix' ! -path './.git/*' -print0 \
            | xargs -0 nix run 'nixpkgs#nixfmt' -- --check

  # ── Flake evaluation ──────────────────────────────────────────────────────
  # nix flake check evaluates (but does not build) nixosConfigurations and
  # darwinConfigurations, and builds devShells for the current system.
  flake-check:
    name: nix flake check
    runs-on: ubuntu-latest
    env:
      # Fine-grained PAT with contents:read on amatos/nix-secrets.
      # Add as a repository secret: Settings → Secrets → Actions.
      NIX_CONFIG: "access-tokens = github.com=${{ secrets.NIX_SECRETS_GITHUB_TOKEN }}"
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: cachix/cachix-action@v15
        with:
          # Add cache name as a repository variable: Settings → Variables → Actions.
          name: ${{ vars.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - run: nix flake check

  # ── NixOS builds ─────────────────────────────────────────────────────────
  # Build NixOS hosts on Linux runners. Only x86_64 hosts are built here;
  # aarch64 hosts are covered by nix flake check evaluation.
  build-ephemeraltron:
    name: Build ephemeraltron
    runs-on: ubuntu-latest
    needs: flake-check
    env:
      NIX_CONFIG: "access-tokens = github.com=${{ secrets.NIX_SECRETS_GITHUB_TOKEN }}"
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: cachix/cachix-action@v15
        with:
          name: ${{ vars.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build ephemeraltron
        run: nix build .#nixosConfigurations.ephemeraltron.config.system.build.toplevel

  # ── Darwin evaluation ─────────────────────────────────────────────────────
  # Darwin configs can't be built on Linux; we verify they evaluate cleanly
  # by resolving the derivation path (evaluation only, no build).
  eval-darwin:
    name: Evaluate darwin configs
    runs-on: ubuntu-latest
    needs: flake-check
    env:
      NIX_CONFIG: "access-tokens = github.com=${{ secrets.NIX_SECRETS_GITHUB_TOKEN }}"
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - name: Evaluate codex
        run: nix eval .#darwinConfigurations.codex.config.system.build.toplevel.drvPath
      - name: Evaluate darwintron
        run: nix eval .#darwinConfigurations.darwintron.config.system.build.toplevel.drvPath
