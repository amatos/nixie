name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel any in-progress run for the same branch/PR when a new push arrives —
# avoids burning runner minutes on a commit that's already been superseded.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Commit signing ───────────────────────────────────────────────────────
  # CLAUDE.md requires every commit (not just tags) to be GPG-signed. %G? is
  # "N" only when a commit has no signature at all — this still works without
  # importing any public key, since we're checking presence, not trust.
  verify-signed-commits:
    name: Verify signed commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check all commits are GPG-signed
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            commits=$(git log --pretty=%H "${BASE_SHA}..${HEAD_SHA}")
          elif [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            commits="$AFTER_SHA"
          else
            commits=$(git log --pretty=%H "${BEFORE_SHA}..${AFTER_SHA}")
          fi

          status=0
          for sha in $commits; do
            sig=$(git log -1 --pretty=%G? "$sha")
            if [ "$sig" = "N" ]; then
              echo "::error::Commit $sha is not GPG-signed"
              status=1
            fi
          done
          exit $status

  # ── Formatting ────────────────────────────────────────────────────────────
  # No nix-secrets needed — uses registry nixpkgs to avoid fetching all inputs
  # just to run a formatter.
  lint:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@v22
      - name: Check .nix formatting
        run: |
          find . -name '*.nix' ! -path './.git/*' -print0 \
            | xargs -0 nix run 'nixpkgs#nixfmt' -- --check

  # ── Flake evaluation ──────────────────────────────────────────────────────
  # nix flake check evaluates (but does not build) nixosConfigurations and
  # darwinConfigurations, and builds devShells for the current system.
  flake-check:
    name: nix flake check
    runs-on: ubuntu-latest
    env:
      # Fine-grained PAT with contents:read on amatos/nix-secrets.
      # Add as a repository secret: Settings → Secrets → Actions.
      NIX_CONFIG: "access-tokens = github.com=${{ secrets.NIX_SECRETS_GITHUB_TOKEN }}"
    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: cachix/cachix-action@v17
        with:
          # Add cache name as a repository variable: Settings → Variables → Actions.
          name: ${{ vars.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - run: nix flake check

  # ── NixOS builds ─────────────────────────────────────────────────────────
  # Build NixOS hosts on Linux runners. Only x86_64 hosts are built here;
  # aarch64 hosts are covered by nix flake check evaluation.
  build-ephemeraltron:
    name: Build ephemeraltron
    runs-on: ubuntu-latest
    needs: flake-check
    env:
      NIX_CONFIG: "access-tokens = github.com=${{ secrets.NIX_SECRETS_GITHUB_TOKEN }}"
    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: cachix/cachix-action@v17
        with:
          name: ${{ vars.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build ephemeraltron
        run: nix build .#nixosConfigurations.ephemeraltron.config.system.build.toplevel

  # ── Darwin evaluation ─────────────────────────────────────────────────────
  # Darwin configs can't be built on Linux; we verify they evaluate cleanly
  # by resolving the derivation path (evaluation only, no build).
  eval-darwin:
    name: Evaluate darwin configs
    runs-on: ubuntu-latest
    needs: flake-check
    env:
      NIX_CONFIG: "access-tokens = github.com=${{ secrets.NIX_SECRETS_GITHUB_TOKEN }}"
    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@v22
      - name: Evaluate codex
        run: nix eval .#darwinConfigurations.codex.config.system.build.toplevel.drvPath
      - name: Evaluate darwintron
        run: nix eval .#darwinConfigurations.darwintron.config.system.build.toplevel.drvPath
